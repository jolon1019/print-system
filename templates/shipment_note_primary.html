<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>打印窗口</title>
  <style>
    @media print {
      @page {
        size: 190mm 65mm;
        margin: 0;
      }
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'SimSun', '宋体', serif;
      font-size: 16px;
      width: 190mm;
      height: 65mm;
      padding: 1mm;
      -webkit-print-color-adjust: exact;
      color-adjust: exact;
      box-sizing: border-box;
    }
    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      margin: 0 auto;
      box-sizing: border-box;
    }
    .header-section {
      display: flex;
      justify-content: flex-start;
      gap: 15px;
      margin: 0 auto 1.5mm auto;
      width: 100%;
      box-sizing: border-box;
    }
    .title {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      margin: 0 auto 2mm auto;
      width: 100%;
      box-sizing: border-box;
    }
    .info-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1mm 3mm;
    }
    .info-item {
      display: flex;
      min-width: 100px;
    }
    .info-label {
      font-weight: bold;
      white-space: nowrap;
    }
    .info-value {
      min-width: 80px;
      margin-left: 1mm;
      padding-left: 1mm;
    }
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .items-table {
      flex: 1;
      width: 100%;
      border-collapse: collapse;
      font-size: 16px;
      margin: 0 auto 1.5mm auto;
      box-sizing: border-box;
    }
    .items-table th,
    .items-table td {
      border: 1px solid #000;
      text-align: center;
      padding: 0.5px 0.5px;
      word-break: break-all;
      height: 0.6cm;
      vertical-align: middle;
    }
    .items-table th {
      font-weight: bold;
      -webkit-print-color-adjust: exact;
      color-adjust: exact;
    }
    .footer-section {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin: 0.2cm auto 0 auto;
      width: 100%;
      box-sizing: border-box;
    }
    .signature-area {
      display: flex;
      flex-direction: column;
      gap: 2mm;
    }
    .signature-line {
      display: flex;
      align-items: center;
    }
    .signature-label {
      white-space: nowrap;
    }
    .signature-box {
      width: 70px;
      margin-left: 1.5mm;
      text-align: center;
    }
    .amount-section {
      text-align: right;
      font-weight: bold;
    }
    .remark-section {
      margin-top: 1mm;
      font-size: 17px;
    }
    .remark-content {
      border-bottom: 1px solid #000;
      min-height: 16px;
      padding-left: 2mm;
    }
    .print-time {
      text-align: right;
      font-size: 12px;
      margin-top: 1mm;
    }
    /* 打印友好的样式 */
    @media print {
      body {
        zoom: 1;
        transform: none;
      }
      * {
        -webkit-print-color-adjust: exact !important;
        color-adjust: exact !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">邯郸盘龙出库单</div>
    
    <div class="header-section">
      <div class="info-item">
        <span class="info-label">出库单位:</span>
        <span class="info-value">{{unit}}</span>
      </div>
      <div class="info-item" style="flex: 1; text-align: center;">
        <span class="info-label">出库日期:</span>
        <span class="info-value">{{outDate}}</span>
      </div>
      <div class="info-item" style="margin-left: auto;">
        <span class="info-label">出库单号:</span>
        <span class="info-value">{{outNo}}</span>
      </div>
    </div>
    
    <div class="main-content">
      <table class="items-table">
        <thead>
          <tr>
            <th style="width: 8%">序号</th>
            <th style="width: 18%">批次号</th>
            <th style="width: 10%">材质</th>
            <th style="width: 18%">规格</th>
            <th style="width: 10%">重量</th>
            <th style="width: 12%">单价</th>
            <th style="width: 12%">总价</th>
          </tr>
        </thead>
        <tbody>
          {{tableContent}}
          <tr>
            <td colspan="4" style="text-align: left; font-weight: bold;">合计:</td>
            <td style="text-align: right; font-weight: bold;">{{totalWeight}}</td>
            <td colspan="2" style="text-align: right; font-weight: bold;">{{totalAmount}}</td>
          </tr>
          <tr>
            <td colspan="7" style="text-align: left; font-size: 16px;">备注: {{remark}}</td>
          </tr>
        </tbody>
      </table>
    </div>
    
    <div class="footer-section">
      <div style="font-size: 15px; margin-top: -3mm;">出库车号: {{vehicleNo}}</div>
      <div style="font-size: 15px; margin-top: 1mm;">经本人核对，确认规格尺寸无误后签字</div>
      <div class="signature-area">
        <div class="signature-line">
          <span class="signature-label">经办人:</span>
          <span class="signature-box"></span>
        </div>
        <div class="signature-line">
          <span class="signature-label">电话:</span>
          <span class="signature-box"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- 静默打印和自动关闭窗口的JavaScript代码 -->
  <script>
    // 配置参数 - 可根据需要修改
    const CONFIG = {
      PRINT_DELAY: 1000,        // 打印延迟时间(毫秒)
      CLOSE_DELAY: 500,        // 关闭窗口延迟时间(毫秒)
      AUTO_CLOSE: true,        // 是否自动关闭窗口
      SILENT_MODE: true,       // 是否启用静默打印(需要浏览器设置配合)
      FORCE_PRINT: false       // 是否强制打印(绕过某些浏览器限制)
    };

    // 静默打印函数
    function silentPrint() {
      try {
        // 针对IE浏览器的静默打印
        if (window.ActiveXObject || "ActiveXObject" in window) {
          var webBrowser = new ActiveXObject('WScript.Shell');
          if (webBrowser) {
            webBrowser.sendKeys('%f');
            webBrowser.sendKeys('p');
            webBrowser.sendKeys('{ENTER}');
            console.log('IE静默打印已触发');
            return;
          }
        }
      } catch (e) {
        console.log('IE静默打印失败:', e.message);
      }

      try {
        // 使用print()方法
        if (CONFIG.FORCE_PRINT) {
          // 强制打印 - 先聚焦再打印
          window.focus();
          setTimeout(function() {
            window.print();
          }, 100);
        } else {
          window.print();
        }
        console.log('打印命令已发送');
      } catch (error) {
        console.error('打印失败:', error);
      }
    }

    // 关闭窗口函数
    function closeWindow() {
      try {
        if (window.opener) {
          // 如果是通过window.open打开的窗口
          window.close();
        } else {
          // 如果不是通过window.open打开的，尝试其他方式
          // 某些浏览器可能需要用户交互才能关闭
          console.log('尝试关闭窗口...');
          window.open('', '_self', '');
          window.close();
        }
      } catch (error) {
        console.error('关闭窗口失败:', error);
      }
    }

    // 页面加载完成后自动打印（仅在非Electron环境中启用）
    window.addEventListener('load', function() {
      // 检查是否在Electron环境中运行
      const isElectron = navigator.userAgent.indexOf('Electron') !== -1;
      
      if (!isElectron) {
        console.log('页面加载完成，准备打印...');
        setTimeout(function() {
          silentPrint();
        }, CONFIG.PRINT_DELAY);
      } else {
        console.log('在Electron环境中运行，禁用自动打印');
      }
    });

    // 打印完成后自动关闭窗口
    window.addEventListener('afterprint', function() {
      console.log('打印完成');
      if (CONFIG.AUTO_CLOSE) {
        setTimeout(function() {
          closeWindow();
        }, CONFIG.CLOSE_DELAY);
      }
    });

    // 兼容不同浏览器的打印事件
    window.onafterprint = function() {
      console.log('打印完成(兼容模式)');
      if (CONFIG.AUTO_CLOSE) {
        setTimeout(function() {
          closeWindow();
        }, CONFIG.CLOSE_DELAY);
      }
    };

    // 防止用户手动取消打印时窗口卡住
    window.addEventListener('beforeprint', function() {
      console.log('开始打印...');
    });

    // 错误处理
    window.addEventListener('error', function(e) {
      console.error('发生错误:', e.error);
    });
  </script>
</body>
</html>
